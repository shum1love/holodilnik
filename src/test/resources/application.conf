# Конфигурация фреймворка

# Активное окружение
env = "local"

# Определение итогового base-url:
# 1. Если задана переменная окружения APP_BASE_URL — используем её
# 2. Иначе берём base-url из блока environments по текущему env
base-url = ${environments.${env}.base-url}
base-url = ${?APP_BASE_URL}

app {
  # Общие настройки (резерв)
}

environments {
  local {
    # Базовый URL приложения
    base-url = "https://www.holodilnik.ru"
  }
}

ui {
  # Подсветка элементов при действиях
  highlight = false

  # Делать скриншот при падении теста
  screenshot-on-fail = true

  # Количество повторных попыток UI-действия
  action-retry-count = 2
}

selenide {
  # Таймаут ожидания элементов (мс)
  timeout = 12000

  # Таймаут полной загрузки страницы (мс)
  page-load-timeout = 30000
}