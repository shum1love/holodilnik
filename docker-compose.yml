services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
    networks:
      - test-net

  selenoid:
    image: aerokube/selenoid:latest-release
    ports:
      - "4444:4444"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./selenoid-config:/root/.aerokube/selenoid
    command: -conf /root/.aerokube/selenoid/browsers.json -limit 10
    networks:
      - test-net

networks:
  test-net:
volumes:
  jenkins-data: